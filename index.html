<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a7c3e">
<title>MinLibMap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

  /* Bottom bar - State A */
  #bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: #fff; border-top: 1px solid #e0e0e0;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    display: flex; gap: 10px; align-items: center;
  }
  #paste-btn {
    flex: 1; padding: 14px 20px; border: none; border-radius: 10px;
    background: #1a7c3e; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #paste-btn:hover { background: #14612f; }
  #paste-btn:active { background: #14612f; }

  /* Input sheet overlay */
  #input-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
    background: rgba(0,0,0,0.4); display: none; opacity: 0;
    transition: opacity 0.2s ease;
  }
  #input-overlay.visible { display: flex; opacity: 1; }
  #input-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #fff; border-radius: 16px 16px 0 0;
    padding: 20px 16px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    max-height: 80vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  #input-overlay.visible #input-sheet { transform: translateY(0); }
  #input-sheet h2 { font-size: 18px; margin-bottom: 4px; color: #1a1a1a; }
  #input-sheet p { font-size: 14px; color: #1a1a1a; margin-bottom: 12px; line-height: 1.4; }
  #paste-area {
    width: 100%; min-height: 140px; border: 2px solid #d0d0d0; border-radius: 10px;
    padding: 12px; font-size: 14px; font-family: monospace; resize: none;
    -webkit-appearance: none; outline: none;
  }
  #paste-area:focus { border-color: #1a7c3e; }
  #input-actions { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  #find-btn {
    flex: 1; padding: 14px; border: none; border-radius: 10px;
    background: #1a7c3e; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }
  #find-btn:hover { background: #14612f; }
  #find-btn:active { background: #14612f; }
  #find-btn:disabled { background: #a0a0a0; }
  #try-example {
    background: none; border: none; color: #1a7c3e; font-size: 13px;
    cursor: pointer; text-decoration: underline; padding: 8px;
    align-self: flex-start; padding-left: 0;
  }
  #try-example:hover { color: #14612f; }
  #cancel-btn {
    padding: 14px 18px; border: 1px solid #d0d0d0; border-radius: 10px;
    background: #fff; color: #333; font-size: 16px; cursor: pointer;
  }
  #cancel-btn:hover { background: #f5f5f5; }

  /* Results panel - State B */
  #results-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: #fff; border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    display: none; flex-direction: column;
    max-height: 55vh; overflow: hidden;
  }
  #results-panel.visible { display: flex; }
  #results-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 16px 8px; flex-shrink: 0;
  }
  #results-header h2 { font-size: 16px; color: #1a1a1a; }
  #clear-btn {
    background: none; border: 1px solid #d0d0d0; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; color: #555; cursor: pointer;
  }
  #clear-btn:hover { background: #f5f5f5; }
  #results-status {
    padding: 0 16px 8px; font-size: 13px; color: #666; flex-shrink: 0;
  }
  #results-list {
    overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .result-row {
    display: flex; align-items: center; padding: 12px 16px;
    border-top: 1px solid #f0f0f0; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .result-row:hover { background: #f5f5f5; }
  .result-row:active { background: #f5f5f5; }
  .result-row.nearest { background: #edf7f0; }
  .result-rank {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; margin-right: 12px;
  }
  .result-rank.on-shelf { background: #1a7c3e; color: #fff; }
  .result-rank.checked-out { background: #ccc; color: #666; }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .result-detail { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-dist { font-size: 13px; color: #1a7c3e; font-weight: 600; flex-shrink: 0; margin-left: 10px; text-align: right; }
  .result-dist.no-gps { color: #aaa; }
  .nearest-badge { font-size: 10px; font-weight: 700; color: #d4a017; margin-left: 6px; }

  /* Error toast */
  #toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 14px; z-index: 3000; display: none; max-width: 90%;
    text-align: center;
  }
  #toast.visible { display: block; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper { border-radius: 10px; }
  .leaflet-popup-content { margin: 12px 14px; font-size: 14px; line-height: 1.5; }
  .popup-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .popup-avail { color: #1a7c3e; font-weight: 600; }
  .popup-avail.out { color: #b22; }
  .popup-call { color: #666; font-size: 13px; }

    background: #1a7c3e; color: #fff; border-radius: 6px;
    text-decoration: none; font-size: 13px; font-weight: 600;
  }

  /* Pulsing user dot */
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(2.2); opacity: 0; } }
  .user-pulse {
    width: 24px; height: 24px; background: rgba(33,150,243,0.3);
    border-radius: 50%; position: absolute;
    animation: pulse 2s ease-in-out infinite;
    left: -4px; top: -4px;
  }
  .user-dot {
    width: 16px; height: 16px; background: #2196F3;
    border: 3px solid #fff; border-radius: 50; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    border-radius: 50%;

  #input-hint {
    font-size: 12px; min-height: 16px; margin-top: 6px;

  }
  @media (hover: none) {
    #bookmarklet-link { cursor: pointer; }

  .drag-hint {
    width: 36px; height: 4px; background: #d0d0d0; border-radius: 2px;
    margin: 0 auto 12px;
  }

// ── Example data (from real catalog: Authority by VanderMeer) ──

// ── Globals ──
let map, userLatLng = null, allMarkers = {}, resultMarkers = [], userMarker = null;

// ── Init Map ──
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([42.36, -71.22], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.control.attribution({ position: 'bottomright' }).addTo(map);

  LIBRARIES.forEach(lib => {
    const m = L.circleMarker([lib.lat, lib.lng], {
      radius: 5, fillColor: '#aaa', color: '#888', weight: 1, fillOpacity: 0.5

    m.bindTooltip(lib.name, { direction: 'top', offset: [0, -6] });
    allMarkers[lib.id] = m;
  });
}

// ── Parser ──
function parseAvailability(text) {
  const lines = text.trim().split(/\n/);
  const results = [];
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line || /available\s+cop/i.test(line) || /^location/i.test(line) || /^call\s*#/i.test(line)) continue;
    if (/^where\s+is\s+it/i.test(line)) continue;

    // Try to extract "X of Y"
    const copyMatch = line.match(/(\d+)\s+of\s+(\d+)/);
    if (!copyMatch) continue;

    const available = parseInt(copyMatch[1]);
    const total = parseInt(copyMatch[2]);

    // Everything after the "X of Y" pattern
    const afterCopies = line.substring(line.indexOf(copyMatch[0]) + copyMatch[0].length);

    // Split remaining by tab or 3+ spaces
    const parts = afterCopies.split(/\t|\s{3,}/).map(s => s.trim()).filter(Boolean);
    if (parts.length === 0) continue;

    const locationPart = parts[0];
    const callNumber = parts.slice(1).join(' ');

    // Split location on last " - "
    const dashIdx = locationPart.lastIndexOf(' - ');
    const libraryName = dashIdx > 0 ? locationPart.substring(0, dashIdx).trim() : locationPart.trim();
    const section = dashIdx > 0 ? locationPart.substring(dashIdx + 3).trim() : '';

    const library = matchLibrary(libraryName);

    results.push({
      available, total, libraryName, section, callNumber,
      onShelf: available > 0,
      library // may be null if unmatched
    });
  }
  return results;
}

function matchLibrary(name) {
  const normalized = name.trim().toLowerCase();
  let bestMatch = null, bestLen = 0;
  for (const lib of LIBRARIES) {
    for (const alias of lib.aliases) {
      const a = alias.toLowerCase();
      if (normalized === a || normalized.startsWith(a)) {
        if (a.length > bestLen) { bestMatch = lib; bestLen = a.length; }
      }
    }
  }
  return bestMatch;
}

// ── Haversine ──
function distanceMiles(lat1, lng1, lat2, lng2) {
  const R = 3959;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── GPS ──
function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) { reject(new Error('Geolocation not supported')); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      err => reject(err),
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
    );
  });
}

  });
  userMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
  userMarker.bindTooltip('You are here', { direction: 'top', offset: [0, -12] });
}

// ── Group rows by resolved library ──
function groupByLibrary(rows) {
  const map = new Map();
  for (const r of rows) {
    const key = r.library ? r.library.id : r.libraryName;
    if (map.has(key)) {
      const g = map.get(key);
      g.available += r.available;
      g.total += r.total;
      g.onShelf = g.available > 0;
      g.copies.push({ section: r.section, callNumber: r.callNumber, available: r.available, total: r.total });
    } else {
      map.set(key, {
        library: r.library,
        libraryName: r.libraryName,
        available: r.available,
        total: r.total,
        onShelf: r.available > 0,
        distance: null,
        copies: [{ section: r.section, callNumber: r.callNumber, available: r.available, total: r.total }]
      });
    }
  }
  return Array.from(map.values());
}

// ── Display Results ──
function showResults(parsed) {
  // Clear old result markers
  resultMarkers.forEach(m => map.removeLayer(m));
  resultMarkers = [];

  // Reset all base markers to gray
  Object.values(allMarkers).forEach(m => m.setStyle({ fillColor: '#aaa', color: '#888', radius: 5, fillOpacity: 0.5 }));

  // Group by library, then compute distances
  const grouped = groupByLibrary(parsed);
  grouped.forEach(r => {
    if (r.library && userLatLng) {
      r.distance = distanceMiles(userLatLng.lat, userLatLng.lng, r.library.lat, r.library.lng);
    } else {
      r.distance = null;
    }
  });

  // Sort: on-shelf first, then by distance (or alphabetically)
  const onShelf = grouped.filter(r => r.onShelf);
  const checkedOut = grouped.filter(r => !r.onShelf);

  if (userLatLng) {
    onShelf.sort((a, b) => (a.distance ?? 999) - (b.distance ?? 999));
    checkedOut.sort((a, b) => (a.distance ?? 999) - (b.distance ?? 999));
  } else {
    onShelf.sort((a, b) => a.libraryName.localeCompare(b.libraryName));
    checkedOut.sort((a, b) => a.libraryName.localeCompare(b.libraryName));
  }

  const sorted = [...onShelf, ...checkedOut];

  // Update map markers
  const bounds = [];
  if (userLatLng) bounds.push([userLatLng.lat, userLatLng.lng]);

  sorted.forEach((r, i) => {
    if (!r.library) return;
    const isOnShelf = r.onShelf;
    const isNearest = isOnShelf && i === 0;

    const color = isOnShelf ? '#1a7c3e' : '#cc3333';
    const radius = isNearest ? 10 : (isOnShelf ? 7 : 5);
    const fillOpacity = isOnShelf ? 0.85 : 0.4;

    // Style the base marker
    const base = allMarkers[r.library.id];
    if (base) base.setStyle({ fillColor: color, color: isOnShelf ? '#0f5c2a' : '#993333', radius, fillOpacity });

    // Add popup
    const copyLines = r.copies.map(c => {
      const label = [c.format, c.section, c.callNumber].filter(Boolean).join(' — ');
      return label ? `<div class="popup-call">${label}</div>` : '';
    }).join('');
    const popupHtml = `
      <div class="popup-name">${r.library.name}</div>
      <div class="${isOnShelf ? 'popup-avail' : 'popup-avail out'}">${r.available} of ${r.total} available</div>
      ${copyLines}
      ${r.distance != null ? `<div style="margin-top:4px;font-size:13px">${r.distance.toFixed(1)} mi away</div>` : ''}
      <a class="popup-directions" href="https://www.google.com/maps/dir/?api=1&destination=${r.library.lat},${r.library.lng}" target="_blank" rel="noopener">Get Directions</a>
    `;
    if (base) base.bindPopup(popupHtml);

    if (isOnShelf) bounds.push([r.library.lat, r.library.lng]);
  });

  // Fit map
  if (bounds.length > 0) {
    if (bounds.length === 1) {
      map.setView(bounds[0], 14);
    } else {
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
    }
  }

  // Open nearest popup
  if (onShelf.length > 0 && onShelf[0].library) {
    const nearest = allMarkers[onShelf[0].library.id];
    if (nearest) setTimeout(() => nearest.openPopup(), 500);
  }

  // Build results list
  const resultsTitle = document.getElementById('results-title');
  const resultsStatus = document.getElementById('results-status');
  const resultsList = document.getElementById('results-list');

  resultsTitle.textContent = onShelf.length > 0
    ? `${onShelf.length} on shelf`
    : 'All checked out';

  const gpsNote = userLatLng ? '' : ' (enable location for distances)';
  resultsStatus.textContent = `${grouped.length} locations found${gpsNote}`;

  resultsList.innerHTML = '';
  sorted.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'result-row' + (r.onShelf && i === 0 && userLatLng ? ' nearest' : '');

    const isNearest = r.onShelf && i === 0;
    const detail = r.copies.map(c => [c.format, c.callNumber || c.section].filter(Boolean).join(' ') || 'No call number').join(', ');
    row.innerHTML = `
      <div class="result-rank ${r.onShelf ? 'on-shelf' : 'checked-out'}">${r.available}</div>
      <div class="result-info">
        <div class="result-name">${r.libraryName}${isNearest ? '<span class="nearest-badge">NEAREST</span>' : ''}</div>
        <div class="result-detail">${detail}${r.onShelf ? '' : ' (checked out)'}</div>
      </div>
      <div class="result-dist ${r.distance != null ? '' : 'no-gps'}">${r.distance != null ? r.distance.toFixed(1) + ' mi' : ''}</div>
    `;

    if (r.library) {
      row.addEventListener('click', () => {
        const targetPx = map.project([r.library.lat, r.library.lng], 15);
        const offsetPx = map.getSize().y * 0.18;
        const adjustedLatLng = map.unproject(targetPx.add([0, offsetPx]), 15);
        map.flyTo(adjustedLatLng, 15, { duration: 0.8 });
        const marker = allMarkers[r.library.id];
        if (marker) setTimeout(() => marker.openPopup(), 850);
      });
    }

    resultsList.appendChild(row);
  });

  // Show results panel, hide bottom bar
  document.getElementById('bottom-bar').style.display = 'none';
  document.getElementById('results-panel').classList.add('visible');
}

// Parse the HTML table that Aspen Discovery returns in its getCopyDetails JSON response.
// Handles both display style 1 (Available Copies | Location | Call #)
// and display style 2 (Volume | Location | Call # | Status | …).
function parseCopyDetailsHtml(html, format) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const table = doc.querySelector('.itemSummaryTable');
  if (!table) return [];

  const headers = [...table.querySelectorAll('thead th')].map(th => th.textContent.trim().toLowerCase());
  const copiesIdx  = headers.findIndex(h => /available|copies/.test(h));
  const locationIdx = headers.findIndex(h => h.includes('location'));
  const callIdx    = headers.findIndex(h => /call/.test(h));
  const statusIdx  = headers.findIndex(h => h.includes('status'));

  if (locationIdx === -1) return [];

  const results = [];
  table.querySelectorAll('tbody tr').forEach(row => {
    const cells = [...row.querySelectorAll('td')].map(td => td.textContent.trim());
    if (!cells.length) return;

    let available = 0, total = 0;
    if (copiesIdx >= 0 && cells[copiesIdx]) {
      const m = cells[copiesIdx].match(/(\d+)\s+of\s+(\d+)/);
      if (m) { available = parseInt(m[1]); total = parseInt(m[2]); }
      else if (/always available/i.test(cells[copiesIdx])) { available = 9999; total = 9999; }
    } else if (statusIdx >= 0 && cells[statusIdx]) {
      // Display style 2: derive on-shelf from status text
      available = /on shelf/i.test(cells[statusIdx]) ? 1 : 0;
      total = 1;
    }

    const locationPart = (cells[locationIdx] || '').trim();
    const callNumber   = callIdx >= 0 ? (cells[callIdx] || '').trim() : '';
    if (!locationPart) return;

    const di = locationPart.lastIndexOf(' - ');
    const libraryName = di > 0 ? locationPart.substring(0, di).trim() : locationPart;
    const section     = di > 0 ? locationPart.substring(di + 3).trim() : '';
    const library     = matchLibrary(libraryName);

    results.push({ available, total, libraryName, section, callNumber, format: format || null, onShelf: available > 0, library });
  });
  return results;
}

// ── Toast ──
function showToast(msg, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), duration);
}

// ── UI Wiring ──
async function init() {
  initMap();

  // ── Bookmarklet hash reader ──
  // When the bookmarklet opens MinLibMap with #data=<base64>, decode and render
  // immediately without any user interaction.
  const hashMatch = window.location.hash.match(/^#data=(.+)/);
  if (hashMatch) {
    try {
      const decoded = decodeURIComponent(escape(atob(decodeURIComponent(hashMatch[1]))));
      let parsed = [];
      try {
        const items = JSON.parse(decoded);
        if (Array.isArray(items)) {
          for (const item of items) {
            parsed.push(...parseCopyDetailsHtml(item.html, item.format));
          }
        } else {
          parsed = parseCopyDetailsHtml(decoded);
        }
      } catch (e) {
        parsed = parseCopyDetailsHtml(decoded);
      }
      if (parsed.length > 0) {
        parsed.filter(r => !r.library).forEach(r => console.warn('Unmatched library:', r.libraryName));
        try {
          const pos = await getUserLocation();
          userLatLng = pos;
          addUserMarker(pos.lat, pos.lng);
        } catch (e) { userLatLng = null; }
        history.replaceState(null, '', location.pathname);
        showResults(parsed);
      }
    } catch (e) {
      console.warn('Could not decode #data hash:', e.message);
    }
  }

  // ── Bookmarklet / Shortcut link ──
  const bookmarkletHint = document.getElementById('bookmarklet-hint');
  const bookmarkletLink = document.getElementById('bookmarklet-link');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isIOS) {
    // On iOS, link to the Shortcuts gallery page instead of a javascript: URI.
    bookmarkletLink.href = 'https://www.icloud.com/shortcuts/c397d32d0b4847f6a071082b3a5c0c21';
    bookmarkletLink.textContent = 'Add MinLibMap Shortcut';
    bookmarkletHint.firstChild.textContent = 'Tap ';
    bookmarkletHint.lastChild.textContent = ' to add the one-tap shortcut for any catalog page.';
  } else {
    // Set href dynamically to avoid HTML-escaping the javascript: URI.
    // Embed the current page's URL as the target so the bookmarklet works from
    // any instance — local dev or production — without hardcoding a URL.
    const bookmarkletTarget = location.href.split('#')[0];
    bookmarkletLink.href = 'javascript:(function(){' +
      'var p=/GroupedWork\\/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(?:-[a-z]{3})?)/i,' +
      'm=location.href.match(p);' +
      'if(!m){var as=document.querySelectorAll(\'a[href*="/GroupedWork/"]\');for(var i=0;i<as.length;i++){m=as[i].href.match(p);if(m)break;}}' +
      'if(!m){alert(\'Open a catalog item page first\');return;}' +
      'var id=m[1],' +
      'base=\'https://catalog.minlib.net\',' +
      'target=\'' + bookmarkletTarget + '\';' +
      'fetch(base+\'/GroupedWork/AJAX?method=getCopyDetails&id=\'+id+\'&recordId=\'+id+\'&format=Book\')' +
        '.then(function(r){return r.json();})' +
        '.then(function(j){' +
          'if(!j.modalBody||/unable to find/i.test(j.modalBody)){alert(\'No availability data found\');return;}' +
          'window.open(target+\'#data=\'+encodeURIComponent(btoa(unescape(encodeURIComponent(j.modalBody)))));' +
        '})' +
        '.catch(function(){alert(\'No availability data found\');});' +
    '})();';
  }

  const bottomBar = document.getElementById('bottom-bar');
  const inputOverlay = document.getElementById('input-overlay');
  const pasteArea = document.getElementById('paste-area');
  const findBtn = document.getElementById('find-btn');
  const resultsPanel = document.getElementById('results-panel');

  const inputHint = document.getElementById('input-hint');

  // Real-time input type detection badge
  pasteArea.addEventListener('input', () => {
    const val = pasteArea.value.trim();
    if (/\d+\s+of\s+\d+/.test(val)) {
      inputHint.textContent = 'Table format detected — ready to parse';
      inputHint.className = 'table';
    } else {
      inputHint.textContent = '';
      inputHint.className = '';
    }
  });

  // Open input sheet
  document.getElementById('paste-btn').addEventListener('click', () => {
    inputOverlay.classList.add('visible');
    setTimeout(() => pasteArea.focus(), 350);
  });

  // Close input sheet
  document.getElementById('cancel-btn').addEventListener('click', () => {
    inputOverlay.classList.remove('visible');
  });
  inputOverlay.addEventListener('click', e => {
    if (e.target === inputOverlay) inputOverlay.classList.remove('visible');
  });

  // Try example
  document.getElementById('try-example').addEventListener('click', () => {
    pasteArea.value = EXAMPLE_DATA;
  });

  // Find My Book
  findBtn.addEventListener('click', async () => {
    const text = pasteArea.value.trim();
    if (!text) { showToast('Please paste availability data'); return; }

    findBtn.disabled = true;
    inputHint.textContent = '';
    inputHint.className = '';

    findBtn.innerHTML = '<span class="spinner"></span>Parsing…';
    const parsed = parseAvailability(text);
    if (parsed.length === 0) {
      showToast('Could not parse availability data. Make sure you copied from the "Where is it?" popup.');
      findBtn.disabled = false;
      findBtn.textContent = 'Find My Book';
      return;
    }

    // Log unmatched branches to console for debugging (see issue #4)
    parsed.filter(r => !r.library).forEach(r => console.warn('Unmatched library:', r.libraryName));

    findBtn.innerHTML = '<span class="spinner"></span>Locating…';

    // Try GPS
    try {
      const pos = await getUserLocation();
      userLatLng = pos;
      addUserMarker(pos.lat, pos.lng);
    } catch (e) {
      console.log('GPS unavailable:', e.message);
      userLatLng = null;
    }

    findBtn.disabled = false;
    findBtn.textContent = 'Find My Book';
    inputOverlay.classList.remove('visible');
    showResults(parsed);
  });

  // Clear / Start Over
  document.getElementById('clear-btn').addEventListener('click', () => {
    resultsPanel.classList.remove('visible');
    bottomBar.style.display = 'flex';
    pasteArea.value = '';

    // Reset markers
    Object.values(allMarkers).forEach(m => {
      m.setStyle({ fillColor: '#aaa', color: '#888', radius: 5, fillOpacity: 0.5 });
      m.closePopup();
      m.unbindPopup();
    });

    if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
    userLatLng = null;

    map.setView([42.36, -71.22], 10);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
